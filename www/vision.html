<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>JARVIS_OS | VISION_HUD</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                colors: { "primary": "#99f7ff", "background": "#0e0e0e" },
                fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] },
              },
            },
          }
    </script>
    <style>
        body { background-color: #0e0e0e; color: #ffffff; overflow: hidden; }
        .glass-panel { background: rgba(38, 38, 38, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(73, 72, 71, 0.15); }
        .scanning { box-shadow: 0 0 40px rgba(153, 247, 255, 0.2); border: 1px solid rgba(153, 247, 255, 0.4); }
    </style>
</head>
<body class="font-body selection:bg-primary/30">
    <header class="fixed top-0 w-full flex justify-between items-center px-8 py-6 z-50">
        <div class="flex items-center gap-8">
            <div class="text-xl font-bold tracking-tighter text-white font-headline">JARVIS_OS</div>
            <nav class="hidden md:flex gap-6">
                <a class="font-space-grotesk tracking-widest uppercase text-xs text-gray-500" href="index.html">SYNOPSIS</a>
                <a class="font-space-grotesk tracking-widest uppercase text-xs text-cyan-400 border-b-2 border-cyan-400" href="#">VISION_HUD</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="window.location.href='index.html'" class="bg-primary/10 border border-primary/20 text-primary px-4 py-2 hover:bg-primary/20 transition-all uppercase text-[10px] tracking-widest">Return to Dashboard</button>
        </div>
    </header>

    <main class="h-screen w-full relative p-20 flex flex-col items-center justify-center">
        <div class="w-full h-full glass-panel border-cyan-400/20 relative overflow-hidden flex items-center justify-center">
            <!-- Simulated Camera Feed -->
            <div class="absolute inset-0 z-0 opacity-40 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
            <!-- Vision UI Overlays -->
            <div class="absolute top-10 left-10 flex flex-col gap-2 z-10">
                <span class="text-[10px] text-primary/60 tracking-widest uppercase">Targeting Node: Activated</span>
                <span id="vision-status" class="text-2xl font-headline text-white tracking-tighter uppercase font-bold animate-pulse">Scanning Environment...</span>
            </div>
            
            <!-- Central Targeting Crosshair -->
            <div class="relative w-96 h-96 border border-primary/20 rounded-full flex items-center justify-center">
                <div class="absolute top-0 left-1/2 -translate-x-1/2 w-px h-10 bg-primary"></div>
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-px h-10 bg-primary"></div>
                <div class="absolute left-0 top-1/2 -translate-y-1/2 w-10 h-px bg-primary"></div>
                <div class="absolute right-0 top-1/2 -translate-y-1/2 w-10 h-px bg-primary"></div>
            </div>
        </div>
    </main>

    <script src="/eel.js" type="text/javascript"></script>
    <script>
        eel.expose(update_status);
        function update_status(statusMsg) {
            document.getElementById('vision-status').innerText = statusMsg;
        }
    </script>
</body>
</html>
